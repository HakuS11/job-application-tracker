<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JobTrackr</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <header class="header">

    <!-- Far left: hamburger -->
    <button class="menu-toggle" id="menuBtn" aria-label="Open menu" aria-expanded="false">
      <span></span>
      <span></span>
      <span></span>
    </button>

    <!-- True center: app name -->
    <div class="logo">JobTrackr</div>

    <!-- Mobile nav dropdown (hidden by default) -->
    <nav class="nav" id="mobileMenu">
      <a href="#">Dashboard</a>
      <a href="#">Applications</a>
      <a href="#">Analytics</a>
    </nav>

    <!-- Far right: theme toggle -->
    <button class="theme-toggle" id="themeToggle" aria-label="Switch to dark mode" aria-pressed="false">
      🌙
    </button>

  </header>

  <main class="content">

    <section class="hero">
      <h1>Applications</h1>
      <p>Track jobs, statuses, salary, and progress in one place.</p>
    </section>

    <section class="cards">
      <div class="card">
        <h3>Total Applications</h3>
        <p>24</p>
      </div>
      <div class="card">
        <h3>Interviewing</h3>
        <p>5</p>
      </div>
      <div class="card">
        <h3>Rejected</h3>
        <p>11</p>
      </div>
      <div class="card">
        <h3>Accepted</h3>
        <p>2</p>
      </div>
    </section>

  </main>

  <script src="script.js"></script>
</body>
</html>
